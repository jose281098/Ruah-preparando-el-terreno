<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preparando el Terreno — Ruah</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F7F0E3;color:#1E120A;min-height:100vh;padding-bottom:60px}
header{background:#2C1A0E;color:#E8D5A3;padding:24px 20px;text-align:center}
header small{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#C8903A;display:block;margin-bottom:6px}
header h1{font-size:26px;font-weight:700;line-height:1.2}
header h1 em{color:#C8903A;font-style:italic}
header p{font-size:12px;opacity:.6;margin-top:6px}
.seeds{display:flex;align-items:center;gap:8px;padding:12px 20px;background:rgba(44,26,14,.06);border-bottom:1px solid #E8D5A3}
.seeds span{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#7A3B1E;font-weight:700;flex-shrink:0}
.seed{width:18px;height:18px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:rgba(138,128,112,.2);border:1.5px solid #E8D5A3;transition:background .3s}
.seed.done{background:#C8903A;border-color:#C8903A}
.seed.active{background:#E8D5A3;border-color:#C8903A}
.days{display:flex;gap:8px;overflow-x:auto;padding:14px 20px 6px;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.dp{flex:0 0 auto;background:white;border:1.5px solid #E8D5A3;border-radius:12px;padding:10px 12px;text-align:center;cursor:pointer;min-width:60px;transition:all .2s}
.dp.active{background:#C8903A;border-color:#C8903A;color:white}
.dp.done-p{background:#4A7C59;border-color:#4A7C59;color:white}
.dp.locked{opacity:.4;cursor:not-allowed}
.dp.sat{background:#7A3B1E;border-color:#7A3B1E;color:#E8D5A3}
.dp-n{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.dp-i{font-size:16px;margin:3px 0}
.dp-d{font-size:9px;opacity:.7}
.card{background:white;border-radius:16px;border:1.5px solid #E8D5A3;margin:12px 16px;overflow:hidden;box-shadow:0 2px 12px rgba(44,26,14,.07)}
.ch{display:flex;align-items:flex-start;gap:12px;padding:16px 18px 14px;border-bottom:1px solid #E8D5A3}
.ci{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.cm small{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700}
.cm h2{font-size:19px;font-weight:700;line-height:1.2;margin-top:2px}
.cb{padding:16px 18px}
.verse{font-style:italic;font-size:13px;border-left:3px solid #C8903A;padding-left:12px;margin-bottom:14px;line-height:1.55;color:#7A3B1E}
.desc{font-size:14px;line-height:1.65;margin-bottom:18px;color:#3a2a1a}
.il{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:#7A3B1E;margin-bottom:10px}
.iq{font-style:italic;font-size:15px;color:#2C1A0E;margin-bottom:12px;line-height:1.4}
.chip{display:flex;align-items:center;gap:10px;background:#F7F0E3;border:1.5px solid #E8D5A3;border-radius:10px;padding:11px 14px;cursor:pointer;font-size:13px;line-height:1.4;color:#2C1A0E;text-align:left;width:100%;margin-bottom:8px;transition:border-color .15s}
.chip.sel{border-color:#C8903A;background:rgba(200,144,58,.1)}
.chip:disabled{opacity:.7;cursor:default}
.chk{width:20px;height:20px;border-radius:5px;border:1.5px solid #E8D5A3;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s}
.chip.sel .chk{background:#C8903A;border-color:#C8903A;color:white}
textarea{width:100%;background:#F7F0E3;border:1.5px solid #E8D5A3;border-radius:10px;padding:12px;font-family:system-ui,sans-serif;font-size:13px;color:#2C1A0E;resize:none;min-height:90px;line-height:1.55;outline:none}
textarea:focus{border-color:#C8903A}
textarea:read-only{opacity:.7}
.rl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:#C8903A;margin:18px 0 8px}
.reto{background:rgba(200,144,58,.08);border:1.5px solid rgba(200,144,58,.3);border-left:3px solid #C8903A;border-radius:10px;padding:14px 16px;font-size:14px;line-height:1.6;color:#2C1A0E}
.wa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#25D366;color:white;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:18px;text-decoration:none}
.btn-done{display:block;background:#2C1A0E;color:#E8D5A3;border:none;border-radius:12px;padding:15px;font-size:14px;font-weight:600;cursor:pointer;margin:14px 16px 18px;width:calc(100% - 32px);transition:background .2s}
.btn-done:hover:not(:disabled){background:#7A3B1E}
.btn-done:disabled{background:#4A7C59;cursor:default}
.locked-card{padding:40px 24px;text-align:center}
.locked-card .lock-icon{font-size:40px;margin-bottom:12px}
.locked-card h3{font-size:16px;font-weight:700;margin-bottom:6px}
.countdown{font-size:32px;font-weight:700;color:#C8903A;letter-spacing:.06em;margin:8px 0}
.locked-card small{font-size:12px;color:#8A8070}
.banner{display:none;background:linear-gradient(135deg,#2E5339,#4A7C59);color:white;border-radius:14px;padding:18px 20px;margin:8px 16px;text-align:center}
.banner.show{display:block}
.banner h3{font-size:17px;font-weight:700;margin-bottom:4px}
.banner p{font-size:12px;opacity:.85;line-height:1.5}
.sat-wrap{padding:12px 0 20px}
.sat-intro{background:#2C1A0E;color:#E8D5A3;border-radius:16px;padding:22px 20px;text-align:center;margin:0 16px 16px}
.sat-intro h2{font-size:22px;font-weight:700;margin-bottom:6px}
.sat-intro h2 em{color:#C8903A;font-style:italic}
.sat-intro p{font-size:13px;opacity:.7;line-height:1.5}
.cat-lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:#7A3B1E;padding:0 20px 12px;display:block}
.cat{border:2px solid #E8D5A3;border-radius:14px;padding:14px 16px;cursor:pointer;background:white;text-align:left;width:calc(100% - 32px);margin:0 16px 10px;display:block;transition:all .2s}
.cat:hover{border-color:#C8903A}
.cat.chosen{border-color:#C8903A;background:rgba(200,144,58,.06)}
.cat-top{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.cat-e{font-size:24px}
.cat-nm{font-size:16px;font-weight:700;color:#2C1A0E}
.cat-d{font-size:13px;color:#5a3a22;line-height:1.45}
.btn-gen{display:block;width:calc(100% - 32px);margin:4px 16px 14px;background:#2C1A0E;color:#E8D5A3;border:none;border-radius:12px;padding:16px;font-size:14px;font-weight:600;cursor:pointer}
.btn-gen:disabled{opacity:.4;cursor:not-allowed}
.sum{border-radius:16px;overflow:hidden;border:2px solid #E8D5A3;margin:0 16px;display:none}
.sum.show{display:block}
.sum-h{padding:22px 20px;text-align:center}
.sum-h small{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.6;display:block;margin-bottom:4px}
.sum-h h3{font-size:22px;font-weight:700}
.sum-h h3 em{font-style:italic}
.sum-badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;color:white;margin-top:8px}
.sum-body{padding:16px 18px}
.sum-sl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:14px}
.sum-day{display:flex;gap:10px;margin-bottom:14px}
.sum-di{font-size:18px;flex-shrink:0;margin-top:2px}
.sum-dn{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
.sum-dc{font-size:13px;line-height:1.5;color:#3a2a1a}
.sum-f{padding:16px 18px;border-top:1px solid #E8D5A3;text-align:center}
.sum-f em{font-family:Georgia,serif;font-style:italic;font-size:13px;display:block;margin-bottom:6px;color:#7A3B1E}
.sum-f p{font-size:12px;line-height:1.5;color:#5a3a22}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2E5339;color:white;padding:12px 22px;border-radius:50px;font-size:13px;font-weight:500;z-index:100;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.debug{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin:10px 16px;font-size:12px;color:#856404}
</style>
</head>
<body>

<header>
  <small>Ruah · Semana de preparación</small>
  <h1>Preparando <em>el Terreno</em></h1>
  <p>Un reto diario para abrir el corazón antes del sábado</p>
</header>

<div class="seeds">
  <span>Tu camino</span>
  <div id="seedsRow" style="display:flex;gap:6px"></div>
</div>

<div class="days" id="daysStrip"></div>
<div id="debugInfo" class="debug"></div>

<div class="banner" id="banner">
  <h3>🌾 ¡Terreno listo!</h3>
  <p>Completaste los 5 días.<br>El cierre del sábado ya está disponible.</p>
</div>

<div id="weekCard"></div>
<div id="satScreen" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
// ── RELOJ — basado en fecha local del dispositivo ─────────────────────────────
// Días de la semana: 0=Dom, 1=Lun, 2=Mar, 3=Mié, 4=Jue, 5=Vie, 6=Sáb
// La semana empieza el lunes 22 jun 2025.
// Día 1 = lunes 22, Día 2 = martes 23, ... Día 5 = viernes 26, Sáb 28 = cierre

// Fecha de inicio fija (año, mes 0-indexed, día)
const INICIO = new Date(2026, 5, 22); // 22 jun 2026

function hoy(){
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}

function daysOpen(){
  const diff = Math.floor((hoy() - INICIO) / 86400000);
  if(diff < 0) return 0;        // antes del lunes
  if(diff >= 5) return 5;       // viernes o después → todos abiertos
  return diff + 1;              // 1 a 5
}

function satOpen(){
  return hoy() >= new Date(2025, 5, 28); // sábado 28 jun
}

function msToNext(){
  const manana = new Date(hoy().getTime() + 86400000);
  return manana - Date.now();
}

function fmt(ms){
  if(ms <= 0) return '00:00:00';
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return [h,m,s].map(x=>String(x).padStart(2,'0')).join(':');
}

// ── DATOS ─────────────────────────────────────────────────────────────────────
const D = [
  {n:'Lunes',s:'Lun',i:'🪨',z:'Terreno Pedregoso',c:'#8A8070',bg:'#F0EDE8',
   t:'El corazón de piedra',
   v:'"Quitaré de ustedes el corazón de piedra y les daré un corazón de carne." — Ez 36:26',
   d:'A veces el corazón se endurece sin que lo notemos. Las decepciones acumuladas, las heridas sin sanar, el cansancio de creer. Van formando una capa que parece protegernos, pero en realidad nos cierra — a Dios, a los demás, a nosotros mismos. Hoy no hay que resolver nada. Solo reconocer las piedras.',
   r:'Sentate en silencio 5 minutos. Sin música ni celular. Prestá atención a lo primero que aparece.',
   ia:{type:'affirm',q:'¿Cuál de estas frases te resuena hoy?',
    o:['Hay una persona con quien tengo el corazón cerrado.','Me cuesta creer que las cosas pueden cambiar.','Hace tiempo que no me permito sentir algo profundamente.','Tengo una herida que nunca terminé de procesar.','Me protejo tanto que a veces me pierdo cosas buenas.','Mi fe se siente más como obligación que como vida.']},
   wa:'🪨 *DÍA 1 — Terreno Pedregoso*\n\n_"Quitaré de ustedes el corazón de piedra."_ — Ez 36:26\n\nHoy empezamos. Entrá a la app, leé la reflexión y marcá lo que te resuena.\n\n¡Nos vemos el sábado! 🌾'},
  {n:'Martes',s:'Mar',i:'🌵',z:'Terreno Árido',c:'#C8903A',bg:'#FFF4E0',
   t:'El desierto interior',
   v:'"Yo abriré ríos en los áridos cerros, y fuentes en medio de los valles." — Is 41:18',
   d:'Hay temporadas en que la fe se siente seca. La oración no fluye, las ganas no aparecen, Dios parece estar en silencio. El desierto en la Biblia no es castigo. Es el lugar donde Dios habla más claro, porque hay menos ruido.',
   r:'Escribí una oración honesta de tres líneas. No tiene que ser bonita. Solo lo que sentís en este momento.',
   ia:{type:'write',q:'¿Qué le dirías a Dios si supieras que te escucha aunque no lo sientas?',ph:'Escribí acá lo que hay adentro… sin filtro.'},
   wa:'🌵 *DÍA 2 — Terreno Árido*\n\n_"Yo abriré ríos en los áridos cerros."_ — Is 41:18\n\nHoy nombramos las temporadas secas. Escribí esa oración honesta en la app. 🌾'},
  {n:'Miércoles',s:'Mié',i:'🌿',z:'Terreno con Malezas',c:'#4A7C59',bg:'#EEF5EF',
   t:'Lo que ahoga la semilla',
   v:'"Las preocupaciones del mundo y el engaño de las riquezas ahogan la palabra." — Mt 13:22',
   d:'Las malezas no son malas en sí mismas. Son cosas que crecieron sin orden — distracciones, hábitos que drenan, preocupaciones que llenaron el lugar que debería tener lo importante. No hay culpa en eso. Pero sí hay una invitación a limpiar.',
   r:'Identificá una sola cosa que esta semana te quitó tiempo o paz sin darte nada real. Solo nómbrala — eso ya es el primer paso.',
   ia:{type:'affirm',q:'¿Qué maleza ocupa más espacio del que debería?',
    o:['El celular y las redes — consumen sin darme nada real.','Una preocupación que no puedo soltar aunque no dependa de mí.','Una relación que drena más de lo que nutre.','El trabajo o estudio no deja espacio para nada más.','El entretenimiento — lo uso para no pensar.','El miedo al futuro me paraliza el presente.']},
   wa:'🌿 *DÍA 3 — Terreno con Malezas*\n\n_"Las preocupaciones del mundo ahogan la palabra."_ — Mt 13:22\n\nHoy identificamos lo que ocupa más espacio. Entrá a la app y nombralo. 🌾'},
  {n:'Jueves',s:'Jue',i:'🌱',z:'Terreno Fértil',c:'#2E5339',bg:'#EAF2EC',
   t:'Lo que ya vive en vos',
   v:'"El que cae en tierra buena da fruto: cien, sesenta o treinta por uno." — Mt 13:23',
   d:'Es fácil ver las piedras, el desierto, las malezas. Lo que cuesta más es reconocer lo que ya está vivo. Hay zonas en tu vida que ya son fértiles — gratitud que se da con naturalidad, generosidad que no calculás, fe que aparece cuando menos esperás.',
   r:'Mandále un mensaje hoy a alguien diciéndole algo concreto que valorás de él o ella. Directo al corazón.',
   ia:{type:'write',q:'¿Qué fruto estás dando ahora mismo, aunque no lo notes?',ph:'Puede ser algo pequeño — paciencia, presencia, alegría que contagiás sin proponértelo…'},
   wa:'🌱 *DÍA 4 — Terreno Fértil*\n\n_"El que cae en tierra buena da fruto."_ — Mt 13:23\n\nHoy reconocemos lo que ya vive en nosotros. Y hay un reto concreto que hacer hoy. 🌾'},
  {n:'Viernes',s:'Vie',i:'✝️',z:'Integración',c:'#7A3B1E',bg:'#F7F0E3',
   t:'El mapa completo',
   v:'"Preparen el camino del Señor, allanen sus senderos." — Lc 3:4',
   d:'Después de cuatro días tenés algo que mucha gente no tiene: un mapa honesto de tu interior. Con sus piedras, sus zonas secas, sus malezas y su tierra fértil. Lo más importante de la parábola del sembrador no es el tipo de terreno. Es que el sembrador siembra en todos por igual.',
   r:'Revisá los días anteriores. No como tarea — como el trabajo real que hiciste esta semana. Mañana llegás con ese mapa en la mano.',
   ia:{type:'affirm',q:'¿Con qué llegás al sábado?',
    o:['Con una piedra que quiero que Dios mueva.','Con una zona seca que ya nombré y eso me libera.','Con algo que quiero soltar.','Con gratitud por lo que ya crece en mí.','Con más preguntas que respuestas — y está bien.','Con ganas de que algo cambie de verdad.','Con paz. Solo con paz.']},
   wa:'✝️ *DÍA 5 — El Mapa Completo*\n\n_"Preparen el camino del Señor."_ — Lc 3:4\n\n¡Último día! Mañana se desbloquea el cierre.\n\n🪨🌵🌿🌱 — ¡Nos vemos con el corazón preparado! 🌾'},
];

const CATS = [
  {id:'prueba',e:'⚔️',n:'Superar una prueba',d:'Estoy en medio de algo difícil y necesito que Dios prepare el terreno para atravesarlo.',c:'#7A3B1E',bg:'#FFF0E8',cl:'Que este sábado sea el inicio de un proceso que ya comenzó en vos esta semana. El terreno que preparaste no fue en vano.'},
  {id:'bendicion',e:'🎁',n:'Recibir una bendición',d:'Hay algo que estoy esperando — una promesa, un sueño, una puerta — y quiero estar listo para recibirlo.',c:'#C8903A',bg:'#FFF8EC',cl:'Lo que sembraste esta semana es preparación para lo que viene. Llegás al sábado con el terreno listo.'},
  {id:'paz',e:'🕊️',n:'Encontrar paz',d:'Hay algo que no puedo controlar y necesito soltar. Quiero que Dios prepare el terreno de mi corazón para descansar.',c:'#2E5339',bg:'#EAF5EE',cl:'La paz no es ausencia de tormenta. Es un terreno tan sólido que la tormenta no te derrumba. Eso es lo que preparaste.'},
];

// ── ESTADO — clave fresca, sin historial corrupto ─────────────────────────────
const STORAGE_KEY = 'ruah-final-v1';
// Borrar todas las claves viejas
['ruah-t5','ruah-t6','ruah-t7','ruah-t8','ruah-t9'].forEach(k=>localStorage.removeItem(k));

let st = {};
try{ st = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }catch(e){}
if(!st.done) st.done = [false,false,false,false,false];
if(!st.af)   st.af   = [[],[],[],[],[]];
if(!st.wr)   st.wr   = ['','','','',''];
if(!st.cat)  st.cat  = null;
if(st.cur === undefined) st.cur = 0;
function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(st)); }catch(e){} }

const allDone = () => st.done.every(Boolean);

// ── UI ────────────────────────────────────────────────────────────────────────
function seeds(){
  const r = document.getElementById('seedsRow'); r.innerHTML='';
  const u = daysOpen();
  for(let i=0;i<5;i++){
    const s = document.createElement('div');
    s.className = 'seed'+(st.done[i]?' done':(i<u?' active':''));
    r.appendChild(s);
  }
}

function strip(){
  const el = document.getElementById('daysStrip'); el.innerHTML='';
  const u = daysOpen();
  D.forEach((d,i)=>{
    const open = i < u;
    const cl = st.done[i]?'done-p':(open?(i===st.cur?'active':''):'locked');
    const p = document.createElement('div');
    p.className = 'dp '+cl;
    p.innerHTML = `<div class="dp-n">${d.s}</div><div class="dp-i">${open?d.i:'🔒'}</div><div class="dp-d">Día ${i+1}</div>`;
    if(open) p.onclick = ()=>selDay(i);
    el.appendChild(p);
  });
  const sp = document.createElement('div');
  sp.className = 'dp '+(satOpen()?'sat':'locked');
  sp.innerHTML = `<div class="dp-n">Sáb</div><div class="dp-i">${satOpen()?'🌾':'🔒'}</div><div class="dp-d">Cierre</div>`;
  if(satOpen()) sp.onclick = ()=>showSat();
  el.appendChild(sp);
}

function showDebug(){
  const u = daysOpen();
  const h = hoy();
  document.getElementById('debugInfo').innerHTML =
    `📅 Hoy: ${h.getDate()}/${h.getMonth()+1}/${h.getFullYear()} &nbsp;|&nbsp; Días abiertos: ${u} &nbsp;|&nbsp; Sáb: ${satOpen()?'✅':'🔒'}`;
}

function selDay(i){
  if(i >= daysOpen()){ toast('Este día todavía no está disponible 🌱'); return; }
  st.cur = i; save();
  document.getElementById('weekCard').style.display='';
  document.getElementById('satScreen').style.display='none';
  strip(); renderCard(i);
}

function showSat(){
  if(!satOpen()){ toast('El cierre se desbloquea el sábado 🌾'); return; }
  document.getElementById('weekCard').style.display='none';
  document.getElementById('satScreen').style.display='';
  strip(); renderSat();
}

function renderCard(i){
  const wrap = document.getElementById('weekCard');
  clearInterval(window._tick);
  if(i >= daysOpen()){
    wrap.innerHTML = `
      <div class="card"><div class="locked-card">
        <div class="lock-icon">🔒</div>
        <h3>${D[i].n} se desbloquea mañana</h3>
        <div class="countdown" id="cdown">${fmt(msToNext())}</div>
        <small>El día abre a las 12:00 a.m.</small>
      </div></div>`;
    window._tick = setInterval(()=>{
      const el = document.getElementById('cdown');
      if(!el){ clearInterval(window._tick); return; }
      const rem = msToNext();
      el.textContent = fmt(rem);
      if(rem <= 0){ clearInterval(window._tick); seeds(); strip(); renderCard(i); }
    },1000);
    return;
  }
  const d = D[i], done = st.done[i];
  let int = '';
  if(d.ia.type==='affirm'){
    const sel = st.af[i]||[];
    int = `<div class="il">Reflexión del día</div><div class="iq">${d.ia.q}</div>`+
      d.ia.o.map((o,x)=>`<button class="chip${sel.includes(x)?' sel':''}" onclick="togAf(${i},${x})" ${done?'disabled':''}><span class="chk">${sel.includes(x)?'✓':''}</span>${o}</button>`).join('');
  } else {
    int = `<div class="il">Reflexión del día</div><div class="iq">${d.ia.q}</div><textarea id="wbox" placeholder="${d.ia.ph}" ${done?'readonly':''}>${st.wr[i]}</textarea>`;
  }
  const wa = `https://wa.me/?text=${encodeURIComponent(d.wa)}`;
  wrap.innerHTML = `
    <div class="card">
      <div class="ch">
        <div class="ci" style="background:${d.bg}">${d.i}</div>
        <div class="cm"><small style="color:${d.c}">Día ${i+1} · ${d.z}</small><h2>${d.t}</h2></div>
      </div>
      <div class="cb">
        <div class="verse">${d.v}</div>
        <div class="desc">${d.d}</div>
        ${int}
        <div class="rl">🌾 Reto del día</div>
        <div class="reto">${d.r}</div>
        <a class="wa" href="${wa}" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Enviar recordatorio al grupo
        </a>
      </div>
    </div>
    <button class="btn-done" onclick="completeDay(${i})" ${done?'disabled':''}>${done?'✓ Reflexión guardada':'Guardar mi reflexión'}</button>`;
  if(d.ia.type==='write'&&!done){
    const box = document.getElementById('wbox');
    if(box) box.addEventListener('input',e=>{st.wr[i]=e.target.value;save();});
  }
}

function togAf(di,oi){
  if(st.done[di]) return;
  const arr=st.af[di],p=arr.indexOf(oi);
  if(p>-1) arr.splice(p,1); else arr.push(oi);
  save(); renderCard(di);
}

function completeDay(i){
  const d = D[i];
  if(d.ia.type==='write'){
    const b = document.getElementById('wbox');
    if(!b||!b.value.trim()){ toast('Escribí tu reflexión primero ✍️'); return; }
    st.wr[i] = b.value.trim();
  } else {
    if(!st.af[i]||!st.af[i].length){ toast('Marcá al menos una opción primero'); return; }
  }
  st.done[i]=true; save();
  toast('¡'+d.z+' registrada! 🌾');
  seeds(); strip(); renderCard(i);
  if(allDone()) document.getElementById('banner').classList.add('show');
}

function renderSat(){
  const wrap = document.getElementById('satScreen');
  wrap.innerHTML = `
    <div class="sat-wrap">
      <div class="sat-intro"><h2>Es <em>sábado</em> 🌾</h2><p>Terminaste la semana. Elegí con qué intención llegás hoy.</p></div>
      <span class="cat-lbl">¿Para qué preparaste el terreno esta semana?</span>
      ${CATS.map(c=>`<button class="cat${st.cat===c.id?' chosen':''}" onclick="chooseCat('${c.id}')">
        <div class="cat-top"><span class="cat-e">${c.e}</span><span class="cat-nm">${c.n}</span></div>
        <div class="cat-d">${c.d}</div></button>`).join('')}
      <button class="btn-gen" id="bg" onclick="genSum()" ${st.cat?'':'disabled'}>Ver mi resumen →</button>
      <div class="sum" id="sumCard"></div>
    </div>`;
  if(st.cat) setTimeout(()=>genSum(),50);
}

function chooseCat(id){
  st.cat=id; save();
  document.querySelectorAll('.cat').forEach(el=>{
    el.classList.toggle('chosen', el.getAttribute('onclick')===`chooseCat('${id}')`);
  });
  const bg=document.getElementById('bg'); if(bg) bg.disabled=false;
}

function genSum(){
  if(!st.cat){ toast('Elegí una categoría primero'); return; }
  const cat=CATS.find(c=>c.id===st.cat);
  const sc=document.getElementById('sumCard');
  const days=D.map((d,i)=>{
    const cnt=d.ia.type==='affirm'
      ?(st.af[i]||[]).map(x=>'• '+d.ia.o[x]).join('<br>')||'<em style="opacity:.5">Sin selección</em>'
      :(st.wr[i]||'<em style="opacity:.5">Sin reflexión</em>');
    return `<div class="sum-day"><div class="sum-di">${d.i}</div><div><div class="sum-dn" style="color:${d.c}">${d.n} — ${d.z}</div><div class="sum-dc">${cnt}</div></div></div>`;
  }).join('');
  sc.innerHTML=`
    <div class="sum-h" style="background:${cat.bg}">
      <small>Ruah · Preparando el Terreno</small>
      <h3>Mi semana <em>en el terreno</em></h3>
      <span class="sum-badge" style="background:${cat.c}">${cat.e} ${cat.n}</span>
    </div>
    <div class="sum-body"><div class="sum-sl" style="color:${cat.c}">Lo que encontré esta semana</div>${days}</div>
    <div class="sum-f" style="background:${cat.bg}">
      <em>"Preparen el camino del Señor, allanen sus senderos." — Lc 3:4</em>
      <p>${cat.cl}</p>
    </div>`;
  sc.classList.add('show');
  sc.scrollIntoView({behavior:'smooth',block:'start'});
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
showDebug();
if(st.cur >= daysOpen()) st.cur = Math.max(0, daysOpen()-1);
seeds(); strip(); renderCard(st.cur);
if(allDone()) document.getElementById('banner').classList.add('show');
</script>
</body>
</html>
